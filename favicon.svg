<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Black disc gradient: top-left specular highlight -->
    <radialGradient id="bg" cx="35%" cy="30%" r="62%">
      <stop offset="0%"   stop-color="#606060"/>
      <stop offset="40%"  stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <!-- White disc gradient: top-left specular highlight -->
    <radialGradient id="wg" cx="33%" cy="28%" r="62%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#d2cec6"/>
      <stop offset="100%" stop-color="#9e9a93"/>
    </radialGradient>
    <!-- Subtle drop shadow filter -->
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Board background -->
  <rect width="64" height="64" fill="#1a4a28"/>

  <!-- Dividing lines (thin, darker green) -->
  <line x1="32" y1="3"  x2="32" y2="61" stroke="#0d2b14" stroke-width="2"/>
  <line x1="3"  y1="32" x2="61" y2="32" stroke="#0d2b14" stroke-width="2"/>

  <!-- Top-left: Black -->
  <circle cx="16" cy="16" r="12.5" fill="url(#bg)" filter="url(#sh)"/>
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Top-right: White -->
  <circle cx="48" cy="16" r="12.5" fill="url(#wg)" filter="url(#sh)"/>
  <circle cx="48" cy="16" r="12.5" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>

  <!-- Bottom-left: White -->
  <circle cx="16" cy="48" r="12.5" fill="url(#wg)" filter="url(#sh)"/>
  <circle cx="16" cy="48" r="12.5" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>

  <!-- Bottom-right: Black -->
  <circle cx="48" cy="48" r="12.5" fill="url(#bg)" filter="url(#sh)"/>
  <circle cx="48" cy="48" r="12.5" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
</svg>
